<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameChanger — Spin the Wheel</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#d4a017">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #1a2e1a;
  --bg-card: #1e3818;
  --bg-card-hover: #243f1e;
  --accent-gold: #ffc857;
  --accent-coral: #ff6b6b;
  --accent-teal: #4ecdc4;
  --text-primary: #f0e6ff;
  --text-secondary: #b8a5d0;
  --text-muted: #7a6890;
  --border: #2e4a28;
  --shadow-glow: rgba(255, 200, 87, 0.25);
  --radius: 12px;
  --wood-light: #c8902d;
  --wood-dark: #8b5e1a;
  --sign-bg: #6b1a1a;
  --sign-border: #c8962d;
  --sign-text-color: #ffd700;
  --bulb-color: #fff8dc;
  --bulb-glow: rgba(255, 220, 80, 0.8);
}

html { font-size: 16px; }

body {
  font-family: 'Nunito', system-ui, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100dvh;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(200, 144, 45, 0.12), transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255, 200, 87, 0.07), transparent),
    radial-gradient(ellipse 50% 50% at 10% 60%, rgba(139, 94, 26, 0.08), transparent);
  pointer-events: none;
  z-index: 0;
}

/* Subtle board-game square grid overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 40px),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 40px);
  pointer-events: none;
  z-index: 0;
}

/* ─── Layout ─── */
.app {
  position: relative;
  z-index: 1;
  display: flex;
  min-height: 100dvh;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  position: relative;
}

/* ─── Title ─── */
.title {
  font-family: 'Bangers', cursive;
  font-size: clamp(2.4rem, 5vw, 3.4rem);
  letter-spacing: 0.1em;
  text-align: center;
  margin-bottom: 0.75rem;
  background: linear-gradient(135deg, var(--accent-gold), var(--accent-coral));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 2px 10px rgba(255, 200, 87, 0.4));
  user-select: none;
  line-height: 1;
}

/* ─── Wheel Container ─── */
.wheel-stage {
  position: relative;
  width: min(82vw, 480px);
  aspect-ratio: 1;
  flex-shrink: 0;
}

.wheel-canvas {
  width: 100%;
  height: 100%;
  display: block;
  filter: drop-shadow(0 8px 32px rgba(0,0,0,0.5))
          drop-shadow(0 2px 8px rgba(0,0,0,0.8));
}

/* Pointer */
.pointer {
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%) rotate(0deg);
  transform-origin: 50% 0%;
  z-index: 10;
  line-height: 0;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.65));
  transition: filter 0.1s;
}

.pointer.tick {
  filter: drop-shadow(0 4px 14px rgba(255,200,87,0.9))
          drop-shadow(0 0 8px rgba(255,200,87,0.55));
}

/* ─── Spin Button ─── */
.spin-btn {
  margin-top: 1rem;
  font-family: 'Bangers', cursive;
  font-size: 1.8rem;
  letter-spacing: 0.12em;
  padding: 0.6em 2.4em;
  border: none;
  border-radius: 60px;
  background: linear-gradient(135deg, var(--accent-gold), #ffaa00);
  color: var(--bg-deep);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow:
    0 4px 16px rgba(255, 200, 87, 0.35),
    inset 0 2px 0 rgba(255,255,255,0.3),
    inset 0 -2px 0 rgba(0,0,0,0.15);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.spin-btn:hover:not(:disabled) {
  transform: translateY(-2px) scale(1.03);
  box-shadow:
    0 6px 24px rgba(255, 200, 87, 0.5),
    inset 0 2px 0 rgba(255,255,255,0.3),
    inset 0 -2px 0 rgba(0,0,0,0.15);
}
.spin-btn:active:not(:disabled) {
  transform: translateY(1px) scale(0.98);
}
.spin-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.spin-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.25) 45%, rgba(255,255,255,0.25) 55%, transparent 60%);
  transform: translateX(-100%);
  animation: btnSheen 3s infinite 1s;
}
@keyframes btnSheen {
  0%, 100% { transform: translateX(-100%); }
  20% { transform: translateX(100%); }
  21% { transform: translateX(-100%); }
}

/* ─── Sidebar Toggle (mobile) ─── */
.sidebar-toggle {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 200;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  cursor: pointer;
  transition: background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.sidebar-toggle:hover { background: var(--bg-card-hover); }

/* ─── Sidebar ─── */
.sidebar {
  width: 340px;
  background: var(--bg-card);
  border-left: 1px solid var(--border);
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

.sidebar h2 {
  font-family: 'Bangers', cursive;
  font-size: 1.4rem;
  letter-spacing: 0.05em;
  color: var(--accent-gold);
  margin-bottom: 1rem;
}

.sidebar h3 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin: 1.2rem 0 0.6rem;
}

/* Game list */
.game-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
  overflow-y: auto;
  margin-bottom: 1rem;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.game-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 0.65rem;
  border-radius: 8px;
  transition: background 0.15s;
  cursor: default;
}
.game-item:hover { background: var(--bg-card-hover); }

.game-item .color-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.game-item label {
  flex: 1;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.game-item label .game-url-hint {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-weight: 400;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100px;
}

.game-item.disabled label {
  color: var(--text-muted);
  text-decoration: line-through;
}

/* Toggle switch */
.toggle {
  position: relative;
  width: 36px;
  height: 20px;
  flex-shrink: 0;
}
.toggle input {
  opacity: 0;
  width: 0;
  height: 0;
  position: absolute;
}
.toggle .slider {
  position: absolute;
  inset: 0;
  background: var(--border);
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.25s;
}
.toggle .slider::before {
  content: '';
  position: absolute;
  width: 14px;
  height: 14px;
  left: 3px;
  bottom: 3px;
  background: var(--text-secondary);
  border-radius: 50%;
  transition: transform 0.25s, background 0.25s;
}
.toggle input:checked + .slider {
  background: var(--accent-teal);
}
.toggle input:checked + .slider::before {
  transform: translateX(16px);
  background: #fff;
}

/* Delete custom game */
.game-item .delete-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1rem;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
  line-height: 1;
}
.game-item .delete-btn:hover {
  color: var(--accent-coral);
  background: rgba(255, 107, 107, 0.1);
}

/* Add game form */
.add-form {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  padding-top: 0.5rem;
  border-top: 1px solid var(--border);
}

.add-form input {
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  padding: 0.5rem 0.75rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-deep);
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s;
}
.add-form input::placeholder { color: var(--text-muted); }
.add-form input:focus { border-color: var(--accent-teal); }

.add-form button {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  padding: 0.5rem;
  border-radius: 8px;
  border: none;
  background: var(--accent-teal);
  color: var(--bg-deep);
  cursor: pointer;
  transition: opacity 0.2s;
}
.add-form button:hover { opacity: 0.85; }

/* ─── Result Overlay ─── */
.result-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(10, 5, 18, 0.85);
  backdrop-filter: blur(8px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}
.result-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.result-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2.5rem 3rem;
  text-align: center;
  max-width: 420px;
  width: 90%;
  transform: scale(0.85) translateY(30px);
  transition: transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,200,87,0.1);
}
.result-overlay.visible .result-card {
  transform: scale(1) translateY(0);
}

.result-card .label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
}

.result-card .game-name {
  font-family: 'Bangers', cursive;
  font-size: clamp(2rem, 6vw, 3rem);
  letter-spacing: 0.04em;
  background: linear-gradient(135deg, var(--accent-gold), var(--accent-coral));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 1.5rem;
  line-height: 1.2;
}

.result-card .btn-row {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  flex-wrap: wrap;
}

.result-card .btn {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  padding: 0.65em 1.6em;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  text-decoration: none;
  display: inline-block;
}
.result-card .btn:hover { transform: translateY(-1px); }

.btn-primary {
  background: linear-gradient(135deg, var(--accent-gold), #ffaa00);
  color: var(--bg-deep);
  box-shadow: 0 4px 16px rgba(255,200,87,0.3);
}
.btn-secondary {
  background: var(--bg-deep);
  color: var(--text-primary);
  border: 1px solid var(--border) !important;
}
.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
}

/* ─── Confetti Canvas ─── */
#confetti-canvas {
  position: fixed;
  inset: 0;
  z-index: 501;
  pointer-events: none;
}

/* ─── Responsive ─── */
@media (max-width: 800px) {
  .sidebar {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    z-index: 150;
    transform: translateX(100%);
    box-shadow: -8px 0 32px rgba(0,0,0,0.4);
    width: min(340px, 85vw);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 140;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .sidebar-backdrop.visible {
    opacity: 1;
    pointer-events: auto;
  }
}

@media (min-width: 801px) {
  .sidebar-toggle { display: none; }
  .sidebar-backdrop { display: none; }
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── No-games message ─── */
.no-games {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
  font-size: 0.95rem;
}
.no-games strong {
  display: block;
  font-size: 1.1rem;
  color: var(--text-secondary);
  margin-bottom: 0.3rem;
}

/* ─── Import CSV ─── */
.btn-import-toggle {
  background: var(--bg-card-hover) !important;
  color: var(--text-secondary) !important;
  border: 1px solid var(--border) !important;
}
.btn-import-toggle:hover { opacity: 0.85; color: var(--text-primary) !important; }

.import-panel {
  display: none;
  flex-direction: column;
  gap: 0.5rem;
  padding: 0.75rem;
  background: var(--bg-deep);
  border-radius: 8px;
  border: 1px solid var(--border);
  margin-top: 0.25rem;
}
.import-panel.visible { display: flex; }

.import-panel textarea {
  font-family: 'Nunito', monospace;
  font-size: 0.8rem;
  padding: 0.5rem 0.75rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-primary);
  resize: vertical;
  min-height: 88px;
  outline: none;
  transition: border-color 0.2s;
}
.import-panel textarea:focus { border-color: var(--accent-teal); }
.import-panel textarea::placeholder { color: var(--text-muted); font-size: 0.78rem; }

.import-panel .file-label {
  font-size: 0.78rem;
  color: var(--accent-teal);
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
  opacity: 0.8;
}
.import-panel .file-label:hover { opacity: 1; }
.import-panel input[type="file"] { display: none; }

.import-btn-row {
  display: flex;
  gap: 0.5rem;
}
.import-btn-row button {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.82rem;
  padding: 0.45rem 0.9rem;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-do-import { background: var(--accent-teal); color: var(--bg-deep); }
.btn-cancel-import { background: var(--bg-card-hover); color: var(--text-secondary); }
.import-btn-row button:hover { opacity: 0.85; }

.import-msg {
  font-size: 0.78rem;
  min-height: 1em;
}

/* ─── Browse Game Library ─── */
.library-section {
  border-top: 1px solid var(--border);
  padding-top: 0.75rem;
  margin-top: 0.75rem;
}

.library-toggle-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0;
  width: 100%;
  transition: color 0.2s;
}
.library-toggle-btn:hover { color: var(--text-primary); }
.library-toggle-btn .chevron { display: inline-block; transition: transform 0.25s; font-style: normal; font-size: 0.7em; }
.library-toggle-btn.open .chevron { transform: rotate(90deg); }

.library-body {
  display: none;
  flex-direction: column;
  gap: 0.5rem;
  margin-top: 0.65rem;
}
.library-body.visible { display: flex; }

.pack-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.pack-tab {
  font-family: 'Nunito', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 0.25rem 0.6rem;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.pack-tab:hover { color: var(--text-secondary); border-color: var(--text-muted); }
.pack-tab.active {
  background: var(--accent-teal);
  border-color: var(--accent-teal);
  color: var(--bg-deep);
}

.library-list {
  list-style: none;
  max-height: 200px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.library-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.3rem 0.4rem;
  border-radius: 6px;
  transition: background 0.15s;
}
.library-item:not(.already-added):hover { background: var(--bg-card-hover); }
.library-item.already-added { opacity: 0.4; }

.library-item input[type="checkbox"] {
  accent-color: var(--accent-teal);
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  cursor: pointer;
}
.library-item.already-added input[type="checkbox"] { cursor: default; }

.library-item label {
  flex: 1;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
}
.library-item.already-added label { cursor: default; }

.library-item .lib-link {
  color: var(--text-muted);
  font-size: 0.8rem;
  text-decoration: none;
  transition: color 0.15s;
  flex-shrink: 0;
  line-height: 1;
}
.library-item .lib-link:hover { color: var(--accent-teal); }

.btn-add-selected {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.82rem;
  padding: 0.5rem;
  border-radius: 8px;
  border: none;
  background: var(--accent-teal);
  color: var(--bg-deep);
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-add-selected:hover { opacity: 0.85; }

/* ─── Reset button ─── */
.btn-reset {
  width: 100%;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.78rem;
  padding: 0.45rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
}
.btn-reset:hover {
  color: var(--accent-coral);
  border-color: var(--accent-coral);
  background: rgba(255, 107, 107, 0.08);
}

/* ─── Wheel Area (sign + wheel) ─── */
.wheel-area {
  display: flex;
  align-items: center;
  gap: 2rem;
  margin-bottom: 1.5rem;
  justify-content: center;
}

/* ─── Carnival Sign ─── */
.carnival-sign {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
  /* Push sign down ~20% of wheel height to visually centre on the wheel disc, not the mount */
  margin-top: clamp(60px, 14%, 96px);
}

.sign-board {
  background: var(--sign-bg);
  border: 5px solid var(--sign-border);
  border-radius: 12px;
  padding: 1rem 1.2rem 1.2rem;
  text-align: center;
  box-shadow:
    0 0 0 2px rgba(80, 10, 10, 0.7),
    0 0 36px rgba(200, 150, 45, 0.6),
    0 16px 48px rgba(0, 0, 0, 0.75),
    inset 0 0 24px rgba(0, 0, 0, 0.35);
  width: 210px;
  position: relative;
}

/* Decorative corner studs */
.sign-board::before,
.sign-board::after {
  content: '';
  position: absolute;
  width: 10px;
  height: 10px;
  background: radial-gradient(circle at 35% 35%, #ffe080, #a06820);
  border-radius: 50%;
  box-shadow: 0 0 4px rgba(255,200,40,0.6);
}
.sign-board::before { top: 6px; left: 6px; box-shadow: 130px 0 0 0 #a06820, 130px 0 4px rgba(255,200,40,0.6); }
.sign-board::after  { bottom: 6px; left: 6px; box-shadow: 130px 0 0 0 #a06820; }

.sign-bulbs {
  display: flex;
  justify-content: space-around;
  padding: 0 0.25rem;
  margin: 0.4rem 0;
}

.sign-bulb {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--bulb-color);
  box-shadow: 0 0 6px 3px var(--bulb-glow), 0 0 16px rgba(255, 200, 40, 0.65);
  animation: bulbPulse 2s infinite ease-in-out;
  flex-shrink: 0;
}
.sign-bulb:nth-child(odd)  { animation-delay: 0s; }
.sign-bulb:nth-child(even) { animation-delay: 1s; }

@keyframes bulbPulse {
  0%, 100% { opacity: 1;   box-shadow: 0 0 6px 3px var(--bulb-glow), 0 0 16px rgba(255,200,40,0.65); }
  50%       { opacity: 0.2; box-shadow: 0 0 2px 1px rgba(255,220,80,0.1); }
}

.sign-text {
  font-family: 'Bangers', cursive;
  font-size: 1.75rem;
  letter-spacing: 0.08em;
  color: #fff8c0;
  -webkit-text-stroke: 1px rgba(180, 120, 0, 0.6);
  text-shadow:
    0 1px 2px rgba(0,0,0,0.9),
    0 0 8px rgba(255,230,60,0.9),
    0 0 20px rgba(255,200,20,0.7),
    0 0 40px rgba(255,160,0,0.45);
  line-height: 1.25;
  padding: 0.35rem 0.4rem;
  text-transform: uppercase;
  animation: signGlow 3s ease-in-out infinite;
}

@keyframes signGlow {
  0%, 100% {
    text-shadow:
      0 1px 2px rgba(0,0,0,0.9),
      0 0 8px rgba(255,230,60,0.9),
      0 0 20px rgba(255,200,20,0.7),
      0 0 40px rgba(255,160,0,0.45);
  }
  50% {
    text-shadow:
      0 1px 2px rgba(0,0,0,0.9),
      0 0 12px rgba(255,240,80,1),
      0 0 30px rgba(255,210,30,0.85),
      0 0 55px rgba(255,170,0,0.6);
  }
}

.sign-post {
  width: 13px;
  height: 52px;
  background: linear-gradient(to right, var(--wood-dark), var(--wood-light), var(--wood-dark));
  border-radius: 3px;
  box-shadow: 2px 0 8px rgba(0,0,0,0.55);
}

.sign-post-base {
  width: 70px;
  height: 13px;
  background: linear-gradient(to bottom, var(--wood-light), var(--wood-dark));
  border-radius: 0 0 5px 5px;
  box-shadow: 0 6px 14px rgba(0,0,0,0.55);
}

/* ─── Wheel Mount (A-frame stand) ─── */
.wheel-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
}

.wheel-mount {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: min(82vw, 480px);
  margin-top: -8px;
  position: relative;
}

.mount-crossbar {
  width: 38%;
  height: 11px;
  background: linear-gradient(to bottom, #e0b04a, #a06820, #c8902d);
  border-radius: 5px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.25);
}

.mount-legs {
  position: relative;
  width: 66%;
  height: 64px;
  margin-top: -3px;
}

.mount-leg {
  width: 11px;
  height: 78px;
  background: linear-gradient(to right, var(--wood-dark), #d4962e, var(--wood-dark));
  border-radius: 5px;
  position: absolute;
  top: 0;
  left: 50%;
  box-shadow: 0 3px 8px rgba(0,0,0,0.55);
}
.mount-leg-left  { transform-origin: top center; transform: translateX(-50%) rotate(-24deg); }
.mount-leg-right { transform-origin: top center; transform: translateX(-50%) rotate(24deg); }

.mount-feet {
  display: flex;
  justify-content: space-between;
  width: 80%;
  margin-top: -5px;
}

.mount-foot {
  width: 58px;
  height: 11px;
  background: linear-gradient(to bottom, #d4962e, var(--wood-dark));
  border-radius: 5px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.55);
}

/* ─── Banner sidebar section ─── */
.banner-section {
  border-top: 1px solid var(--border);
  padding-top: 0.75rem;
  margin-top: 0.75rem;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.banner-section textarea {
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  padding: 0.5rem 0.75rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-deep);
  color: var(--text-primary);
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}
.banner-section textarea:focus   { border-color: var(--accent-teal); }
.banner-section textarea::placeholder { color: var(--text-muted); }

#banner-text-save {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  padding: 0.45rem;
  border-radius: 8px;
  border: none;
  background: var(--accent-gold);
  color: var(--bg-deep);
  cursor: pointer;
  transition: opacity 0.2s;
}
#banner-text-save:hover { opacity: 0.85; }

/* ─── Responsive: narrow screens ─── */
@media (max-width: 700px) {
  .wheel-area {
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }
  .sign-board {
    width: min(75vw, 200px);
  }
  .sign-text {
    font-size: 1.5rem;
  }
}

/* ─── Fairness Footer ─── */
.fairness-footer {
  border-top: 1px solid var(--border);
  margin-top: 1rem;
  padding-top: 0.75rem;
  font-size: 0.78rem;
  color: var(--text-muted);
  line-height: 1.6;
  text-align: center;
}
.fairness-footer:empty { display: none; }

/* ─── Pick Badges ─── */
.pick-badge {
  font-size: 0.7rem;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 4px;
  background: rgba(255,255,255,0.07);
  color: var(--text-secondary);
  flex-shrink: 0;
  margin-left: 0.25rem;
}
.pick-badge.zero {
  background: rgba(255, 107, 107, 0.18);
  color: var(--accent-coral);
}

/* ─── Stats Panel ─── */
.btn-clear-history {
  margin-top: 0.6rem;
  width: 100%;
  padding: 0.4rem;
  font-size: 0.78rem;
  background: rgba(255,107,107,0.12);
  color: var(--accent-coral);
  border: 1px solid rgba(255,107,107,0.3);
  border-radius: var(--radius);
  cursor: pointer;
  font-family: inherit;
}
.btn-clear-history:hover { background: rgba(255,107,107,0.22); }

/* ─── Stress Results Modal ─── */
.stress-card {
  max-width: 480px;
  width: 92vw;
  max-height: 80vh;
  overflow-y: auto;
}
.stress-verdict {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  background: rgba(255,255,255,0.05);
  border-radius: var(--radius);
  padding: 0.75rem 1rem;
  margin: 0.75rem 0;
  font-size: 0.88rem;
  line-height: 1.5;
}
.stress-verdict .verdict-icon { font-size: 1.4rem; flex-shrink: 0; }
.stress-verdict .verdict-text { color: var(--text-secondary); }
.stress-verdict .verdict-text strong { color: var(--text-primary); display: block; margin-bottom: 0.2rem; }
.stress-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
  margin-top: 0.5rem;
}
.stress-table th {
  color: var(--text-muted);
  font-weight: 600;
  text-align: right;
  padding: 0.2rem 0.4rem;
  border-bottom: 1px solid var(--border);
}
.stress-table th:first-child { text-align: left; }
.stress-table td {
  padding: 0.3rem 0.4rem;
  text-align: right;
  color: var(--text-secondary);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.stress-table td:first-child { text-align: left; color: var(--text-primary); }
.stress-bar-wrap { background: rgba(255,255,255,0.08); border-radius: 3px; height: 6px; overflow: hidden; width: 60px; display: inline-block; vertical-align: middle; }
.stress-bar-fill { height: 100%; border-radius: 3px; background: var(--accent-teal); }
.stress-chi { font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: 0.5rem; }

.btn-stress-test {
  margin-top: 0.4rem;
  width: 100%;
  padding: 0.4rem;
  font-size: 0.78rem;
  background: rgba(78,205,196,0.12);
  color: var(--accent-teal);
  border: 1px solid rgba(78,205,196,0.3);
  border-radius: var(--radius);
  cursor: pointer;
  font-family: inherit;
}
.btn-stress-test:hover { background: rgba(78,205,196,0.22); }

.stats-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  padding: 0.25rem 0;
  font-size: 0.78rem;
  border-bottom: 1px solid var(--border);
}
.stats-row:last-child { border-bottom: none; }
.stats-row .stats-name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text-secondary);
}
.stats-row .stats-count { color: var(--text-primary); font-weight: 700; min-width: 2ch; text-align: right; }
.stats-row .stats-pct  { color: var(--text-muted); min-width: 5ch; text-align: right; }
.stats-total {
  font-size: 0.78rem;
  color: var(--text-muted);
  padding: 0.4rem 0 0.2rem;
  text-align: center;
}
</style>

    <div class="wheel-area">

function loadGames() {
  const stored = localStorage.getItem('gamechanger_games');
  if (stored) {
    try {
      const parsed = JSON.parse(stored);
      const defaultNames = new Set(DEFAULT_GAMES.map(g => g.name.toLowerCase()));
      // Remove built-in games that are no longer in DEFAULT_GAMES (cleanup migration)
      games = parsed.filter(g => g.custom || defaultNames.has(g.name.toLowerCase()));
      saveGames();
      return;
    } catch(e) {}
  }
  games = DEFAULT_GAMES.map(g => ({ ...g }));
  saveGames();
}

function saveGames() {
  localStorage.setItem('gamechanger_games', JSON.stringify(games));
}

// ─── Spin History ───
function loadHistory() {
  const stored = localStorage.getItem('gamechanger_history');
  if (stored) {
    try {
      const h = JSON.parse(stored);
      if (typeof h.totalSpins === 'number' && typeof h.picks === 'object') return h;
    } catch(e) {}
  }
  return { totalSpins: 0, picks: {} };
}

function saveHistory(h) {
  localStorage.setItem('gamechanger_history', JSON.stringify(h));
}

  const h = loadHistory();

// ─── Stress Test ───
let stressTestCounts = null; // null = inactive, object = active
let stressTestTimer = null;

function drawSegmentCounts(counts, angle) {
  const active = getActiveGames();
  if (active.length === 0) return;
  const size = canvas.clientWidth;
  const cx = size / 2;
  const cy = size / 2;
  const r = (size / 2) - 8;
  const sliceAngle = (Math.PI * 2) / active.length;
  const total = Object.values(counts).reduce((s, v) => s + v, 0);

  active.forEach((game, i) => {
    const mid = angle + i * sliceAngle + sliceAngle / 2;
    const labelR = r * 0.58;
    const lx = cx + Math.cos(mid) * labelR;
    const ly = cy + Math.sin(mid) * labelR;
    const count = counts[game.name] || 0;
    const pct = total > 0 ? ((count / total) * 100).toFixed(1) : '0.0';

    ctx.save();
    ctx.translate(lx, ly);

    // Measure text to size the pill dynamically
    const countLine = String(count);
    const pctLine = `${pct}%`;
    ctx.font = '800 15px Nunito,sans-serif';
    const countW = ctx.measureText(countLine).width;
    ctx.font = '600 12px Nunito,sans-serif';
    const pctW = ctx.measureText(pctLine).width;
    const textW = Math.max(countW, pctW);
    const pillW = textW + 16, pillH = 36;

    // Pill background
    ctx.beginPath();
    ctx.roundRect(-pillW / 2, -pillH / 2, pillW, pillH, 6);
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Count (big)
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '800 15px Nunito,sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(countLine, 0, -8);

    // Percentage (smaller, muted)
    ctx.font = '600 12px Nunito,sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.fillText(pctLine, 0, 10);

    ctx.restore();
  });
}

function startStressTest() {
  const active = getActiveGames();
  if (active.length === 0) return;
  if (stressTestTimer) stopStressTest();

  const TOTAL = 10000;
  const BATCH = 100; // picks per frame
  let done = 0;
  stressTestCounts = {};
  active.forEach(g => { stressTestCounts[g.name] = 0; });

  const btn = document.getElementById('stress-test-btn');
  if (btn) btn.textContent = '⏹ Stop simulation';

  function step() {
    for (let i = 0; i < BATCH && done < TOTAL; i++, done++) {
      const winner = pickWinner(active);
      stressTestCounts[winner.name] = (stressTestCounts[winner.name] || 0) + 1;
    }
    drawWheel(currentAngle);
    drawSegmentCounts(stressTestCounts, currentAngle);
    if (done < TOTAL) {
      stressTestTimer = requestAnimationFrame(step);
    } else {
      stressTestTimer = null;
      if (btn) btn.textContent = '🎲 Simulate 10,000 spins';
      showStressResults(stressTestCounts, TOTAL, active);
      // keep stressTestCounts so numbers stay on wheel after modal closes
    }
  }
  stressTestTimer = requestAnimationFrame(step);
}

// Chi-square critical values at p=0.05 indexed by degrees of freedom (1–20)
const CHI2_CRIT = [0,3.84,5.99,7.81,9.49,11.07,12.59,14.07,15.51,16.92,18.31,19.68,21.03,22.36,23.68,25.00,26.30,27.59,28.87,30.14,31.41];

function showStressResults(counts, total, active) {
  const n = active.length;
  const expected = total / n;

  // Chi-square goodness-of-fit
  let chi2 = 0;
  active.forEach(g => {
    const o = counts[g.name] || 0;
    chi2 += Math.pow(o - expected, 2) / expected;
  });
  const df = n - 1;
  const crit = CHI2_CRIT[Math.min(df, 20)] || 31.41;
  const passed = chi2 < crit;

  // Max deviation from expected %
  let maxDev = 0;
  active.forEach(g => {
    const dev = Math.abs(((counts[g.name] || 0) / total * 100) - (100 / n));
    if (dev > maxDev) maxDev = dev;
  });

  const icon = passed ? '✅' : '⚠️';
  const heading = passed ? 'Looks perfectly fair!' : 'Unusual distribution';
  const body = passed
    ? `Chi-square test passed (χ²\u202f=\u202f${chi2.toFixed(1)}, critical\u202f${crit.toFixed(1)} at p=0.05). The largest deviation from expected was ${maxDev.toFixed(2)}% — well within normal random variance.`
    : `Chi-square test flagged a skew (χ²\u202f=\u202f${chi2.toFixed(1)} > ${crit.toFixed(1)}). Max deviation ${maxDev.toFixed(2)}%. This can happen by chance 5% of the time — try running again.`;

  // Build table rows
  const rows = active.map(g => {
    const o = counts[g.name] || 0;
    const pct = (o / total * 100).toFixed(1);
    const expPct = (100 / n).toFixed(1);
    const fillPct = Math.min(100, (o / total) * n * 100); // relative to expected = 100%
    return `<tr>
      <td>${g.name}</td>
      <td>${o.toLocaleString()}</td>
      <td>${pct}%</td>
      <td>${expPct}%</td>
      <td><div class="stress-bar-wrap"><div class="stress-bar-fill" style="width:${fillPct}%"></div></div></td>
    </tr>`;
  }).join('');

  document.getElementById('stress-results-body').innerHTML = `
    <div class="stress-verdict">
      <span class="verdict-icon">${icon}</span>
      <span class="verdict-text"><strong>${heading}</strong>${body}</span>
    </div>
    <table class="stress-table">
      <thead><tr><th>Game</th><th>Picks</th><th>Actual</th><th>Expected</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <p class="stress-chi">χ²\u202f=\u202f${chi2.toFixed(2)} &nbsp;·&nbsp; df\u202f=\u202f${df} &nbsp;·&nbsp; ${total.toLocaleString()} spins</p>
  `;
  document.getElementById('stress-overlay').classList.add('visible');
}

function stopStressTest() {
  if (stressTestTimer) { cancelAnimationFrame(stressTestTimer); stressTestTimer = null; }
  stressTestCounts = null;

// ─── Audio ───
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTick(omega, impulse = 0.5) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const vol = 0.1 + impulse * 0.22;

  // Layer 1: woody body thud — low fixed-pitch resonance, no frequency sweep
  // Real impacts don't sweep; they strike at one pitch and decay
  const bodyFreq = 160 + impulse * 140;   // 160–300 Hz: wood/brass body range
  const bodyDecay = 0.045 + impulse * 0.1; // 45–145 ms: longer ring on harder hits
  const osc = audioCtx.createOscillator();
  const oscGain = audioCtx.createGain();
  osc.connect(oscGain);
  oscGain.connect(audioCtx.destination);
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(bodyFreq, t);
  oscGain.gain.setValueAtTime(vol * 0.5, t);
  oscGain.gain.exponentialRampToValueAtTime(0.001, t + bodyDecay);
  osc.start(t);
  osc.stop(t + bodyDecay + 0.01);

  // Layer 2: impact transient — bandpass-filtered noise burst for the "thwack"
  // Gives the physical click character without pitched sweep
  const clickDecay = 0.008 + impulse * 0.018; // 8–26 ms: very sharp transient
  const bufLen = Math.ceil(audioCtx.sampleRate * (clickDecay + 0.01));
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

  const noiseSrc = audioCtx.createBufferSource();
  noiseSrc.buffer = buf;
  const bpf = audioCtx.createBiquadFilter();
  bpf.type = 'bandpass';
  bpf.frequency.value = 400 + impulse * 250;  // 400–650 Hz: mid-range thwack, not shrill
  bpf.Q.value = 1.8;
  const noiseGain = audioCtx.createGain();
  noiseSrc.connect(bpf);
  bpf.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);
  noiseGain.gain.setValueAtTime(vol * 0.9, t);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, t + clickDecay);
  noiseSrc.start(t);
  noiseSrc.stop(t + clickDecay + 0.005);
}

function didCross(prev, curr, target) {
  // Detect if angle swept from prev→curr (forward/CW) crossed target, handles wraparound
  const span = (curr - prev + Math.PI * 2) % (Math.PI * 2);
  const dist = (target - prev + Math.PI * 2) % (Math.PI * 2);
  return dist > 0 && dist <= span;
}

function playVictory() {
  if (!audioCtx) return;
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    const t = audioCtx.currentTime + i * 0.12;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.15, t + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc.start(t);
    osc.stop(t + 0.35);
  });
}

function drawWheel(angle) {
  const active = getActiveGames();
  const size = canvas.clientWidth;
  const cx = size / 2;
  const cy = size / 2;
  const r = (size / 2) - 8;

  ctx.clearRect(0, 0, size, size);

  if (active.length === 0) {
    // Draw empty wheel
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#2a1f3a';
    ctx.fill();
    ctx.strokeStyle = '#3d2d52';
    ctx.lineWidth = 4;
    ctx.stroke();
    drawHub(cx, cy, r);
    return;
  }

  const sliceAngle = (Math.PI * 2) / active.length;

  active.forEach((game, i) => {
    const startAngle = angle + i * sliceAngle;
    const endAngle = startAngle + sliceAngle;

    // Segment
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = SEGMENT_COLORS[i % SEGMENT_COLORS.length];
    ctx.fill();

    // Subtle inner shadow
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.clip();
    const grad = ctx.createRadialGradient(cx, cy, r * 0.6, cx, cy, r);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.2)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    // Segment gloss highlight
    const midAngle = startAngle + sliceAngle / 2;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.clip();
    const gloss = ctx.createRadialGradient(
      cx, cy, r * 0.55,
      cx + Math.cos(midAngle) * r * 0.3, cy + Math.sin(midAngle) * r * 0.3, r * 0.9
    );
    gloss.addColorStop(0, 'rgba(255,255,255,0)');
    gloss.addColorStop(0.5, 'rgba(255,255,255,0.08)');
    gloss.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = gloss;
    ctx.fill();
    ctx.restore();

    // Segment border
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + sliceAngle / 2);
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    const fontSize = Math.max(11, Math.min(20, r * 0.13, (sliceAngle * r * 0.44) / (game.name.length * 0.52)));
    ctx.font = `800 ${fontSize}px 'Nunito', sans-serif`;
    const tx = r - 14;
    // Hard offset shadow (simulates physical raised letters)
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillText(game.name, tx + 1.5, 1.5);
    // Soft ambient shadow for depth
    ctx.shadowColor = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur = 4;
    // Main white text
    ctx.fillStyle = '#ffffff';
    ctx.fillText(game.name, tx, 0);
    ctx.shadowBlur = 0;
    // Thin dark outline for crispness
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth = 0.6;
    ctx.strokeText(game.name, tx, 0);
    ctx.restore();
  });

  // Metallic rim
  const rimWidth = 9;
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  const rimGrad = ctx.createLinearGradient(cx - r, cy, cx + r, cy);
  rimGrad.addColorStop(0, '#888');
  rimGrad.addColorStop(0.25, '#e0e0e0');
  rimGrad.addColorStop(0.5, '#b8b8b8');
  rimGrad.addColorStop(0.75, '#e0e0e0');
  rimGrad.addColorStop(1, '#888');
  ctx.strokeStyle = rimGrad;
  ctx.lineWidth = rimWidth;
  ctx.stroke();
  // Inner shadow on rim
  ctx.beginPath();
  ctx.arc(cx, cy, r - rimWidth * 0.5, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.22)';
  ctx.lineWidth = rimWidth * 0.45;
  ctx.stroke();
  ctx.restore();

  // Domed metal studs at segment boundaries
  if (active.length > 1) {
    active.forEach((_, i) => {
      const a = angle + i * sliceAngle;
      const px = cx + Math.cos(a) * (r - 4.5);
      const py = cy + Math.sin(a) * (r - 4.5);
      // Shadow
      ctx.beginPath();
      ctx.arc(px + 1, py + 1, 5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fill();
      // Domed stud with radial gradient
      const studGrad = ctx.createRadialGradient(px - 1.8, py - 1.8, 0, px, py, 5);
      studGrad.addColorStop(0, '#ffffff');
      studGrad.addColorStop(0.35, '#d8d8d8');
      studGrad.addColorStop(1, '#666666');
      ctx.beginPath();
      ctx.arc(px, py, 5, 0, Math.PI * 2);
      ctx.fillStyle = studGrad;
      ctx.fill();
    });
  }

  // Spokes overlay — subtle metallic detail on top of segments
  const numSpokes = 8;
  ctx.save();
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < numSpokes; i++) {
    const a = angle + (i / numSpokes) * Math.PI * 2;
    const innerR = r * 0.16;
    const sx = cx + Math.cos(a) * innerR;
    const sy = cy + Math.sin(a) * innerR;
    const ex = cx + Math.cos(a) * (r - rimWidth - 1);
    const ey = cy + Math.sin(a) * (r - rimWidth - 1);
    const spokeGrad = ctx.createLinearGradient(sx, sy, ex, ey);
    spokeGrad.addColorStop(0, 'rgba(255,255,255,0.9)');
    spokeGrad.addColorStop(1, 'rgba(200,200,200,0.3)');
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = spokeGrad;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.restore();

  drawHub(cx, cy, r);
  if (stressTestCounts) drawSegmentCounts(stressTestCounts, angle);
}

function drawHub(cx, cy, r) {
  const hubR = r * 0.14;

  // Outer gunmetal ring
  const gunGrad = ctx.createRadialGradient(cx - hubR * 0.2, cy - hubR * 0.25, 0, cx, cy, hubR);
  gunGrad.addColorStop(0, '#585268');
  gunGrad.addColorStop(0.55, '#2e2840');
  gunGrad.addColorStop(1, '#1a1528');
  ctx.beginPath();
  ctx.arc(cx, cy, hubR, 0, Math.PI * 2);
  ctx.fillStyle = gunGrad;
  ctx.fill();

  // 4 bolt/screw marks in the gunmetal ring
  const boltR = hubR * 0.87;
  const boltSize = hubR * 0.14;
  for (let i = 0; i < 4; i++) {
    const ba = (i * Math.PI / 2);
    const bx = cx + Math.cos(ba) * boltR;
    const by = cy + Math.sin(ba) * boltR;
    const boltGrad = ctx.createRadialGradient(bx - boltSize * 0.3, by - boltSize * 0.3, 0, bx, by, boltSize);
    boltGrad.addColorStop(0, '#aaaaaa');
    boltGrad.addColorStop(1, '#383838');
    ctx.beginPath();
    ctx.arc(bx, by, boltSize, 0, Math.PI * 2);
    ctx.fillStyle = boltGrad;
    ctx.fill();
    // Slot line
    ctx.save();
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = boltSize * 0.45;
    ctx.beginPath();
    ctx.moveTo(bx - boltSize * 0.65, by);
    ctx.lineTo(bx + boltSize * 0.65, by);
    ctx.stroke();
    ctx.restore();
  }

  // Chrome middle ring
  const chromeR = hubR * 0.72;
  const chromeGrad = ctx.createRadialGradient(cx - chromeR * 0.3, cy - chromeR * 0.3, 0, cx, cy, chromeR);
  chromeGrad.addColorStop(0, '#f2f2f2');
  chromeGrad.addColorStop(0.35, '#c8c8c8');
  chromeGrad.addColorStop(0.75, '#909090');
  chromeGrad.addColorStop(1, '#585858');
  ctx.beginPath();
  ctx.arc(cx, cy, chromeR, 0, Math.PI * 2);
  ctx.fillStyle = chromeGrad;
  ctx.fill();

  // Gold center cap
  const goldR = hubR * 0.5;
  const goldGrad = ctx.createRadialGradient(cx - goldR * 0.35, cy - goldR * 0.35, 0, cx, cy, goldR);
  goldGrad.addColorStop(0, '#ffe49a');
  goldGrad.addColorStop(0.45, '#ffc857');
  goldGrad.addColorStop(1, '#d4920a');
  ctx.beginPath();
  ctx.arc(cx, cy, goldR, 0, Math.PI * 2);
  ctx.fillStyle = goldGrad;
  ctx.fill();

  // Shine highlight on gold cap
  ctx.beginPath();
  ctx.arc(cx - goldR * 0.2, cy - goldR * 0.2, goldR * 0.42, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.fill();
}

// ─── Spin Logic ───
const easings = [
  t => 1 - Math.pow(1 - t, 3),   // cubic ease-out (classic)
  t => 1 - Math.pow(1 - t, 4),   // quartic: fast start, hard stop
  t => 1 - Math.pow(1 - t, 2),   // quadratic: gentle decel
  t => t < 0.6                    // two-phase: coast then hard brake
      ? (t / 0.6) * 0.85
      : 0.85 + (1 - Math.pow(1 - ((t - 0.6) / 0.4), 4)) * 0.15,
];

function spin() {
  const active = getActiveGames();
  if (active.length === 0 || spinning) return;

  initAudio();
  spinning = true;
  spinBtn.disabled = true;

  const sliceAngle = (Math.PI * 2) / active.length;

  // Pick a random easing profile for this spin
  const easeOut = easings[Math.floor(cryptoRandom() * easings.length)];

  // Pick winner upfront for true uniform randomness
  const winner = pickWinner(active);
  const winnerIndex = active.indexOf(winner);

  // Target: pointer centered on winner segment with random offset within middle 60% of segment
  const randomOffset = (0.1 + cryptoRandom() * 0.8) * sliceAngle;
  const targetPointerAngle = winnerIndex * sliceAngle + randomOffset;
  // Invert the finalPointerAngle formula to get target currentAngle
  const targetAngle = (-Math.PI / 2 - targetPointerAngle + Math.PI * 4) % (Math.PI * 2);
  // Add enough full rotations for a dramatic spin (8–12 rotations)
  const nSpins = 6 + cryptoRandom() * 9;
  const startAngle = currentAngle;
  const totalTravel = (targetAngle - (startAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2) + nSpins * Math.PI * 2;
  const duration = 3500 + cryptoRandom() * 2500; // 3.5–6.0 seconds

  let lastTime = null;
  let prevAngle = currentAngle;

  // Clapper pendulum state (JS-driven, not CSS transition)
  let clapperAngle = 0;
  let clapperOmega = 0;

  // Settle wobble state
  let settling = false;
  let settleStart = 0;
  let settleAngle = 0;

  const spinStart = performance.now();

  function animate(now) {
    if (lastTime === null) { lastTime = now; requestAnimationFrame(animate); return; }
    const dt = now - lastTime;
    lastTime = now;
    const dtN = dt / 16.67;

    // Clapper pendulum physics — runs every frame including wobble phase
    const clapperSpring = 0.00015;
    const clapperDamp = Math.pow(0.88, dtN);
    clapperOmega -= clapperSpring * clapperAngle * dt;
    clapperOmega *= clapperDamp;
    clapperAngle += clapperOmega * dt;
    pointer.style.transform = `translateX(-50%) rotate(${clapperAngle * 180 / Math.PI}deg)`;

    if (!settling) {
      const elapsed = now - spinStart;
      const t = Math.min(elapsed / duration, 1);
      prevAngle = currentAngle;
      currentAngle = startAngle + totalTravel * easeOut(t);
      drawWheel(currentAngle);

      // Pin-crossing detection: segment boundaries at n*sliceAngle in wheel-space
      // cross the top of the screen (3π/2 in [0,2π] canvas coords)
      const N = active.length;
      const TOP = Math.PI * 1.5;
      for (let n = 0; n < N; n++) {
        const prevPin = (prevAngle + n * sliceAngle) % (Math.PI * 2);
        const currPin = (currentAngle + n * sliceAngle) % (Math.PI * 2);
        if (didCross(prevPin, currPin, TOP)) {
          const speed = (currentAngle - prevAngle) / dt; // radians per ms
          const impulse = Math.min(speed / 0.065, 1);
          clapperOmega += 0.025 + impulse * 0.09;
          playTick(speed, impulse);
          pointer.classList.add('tick');
          setTimeout(() => pointer.classList.remove('tick'), 60);
          break; // at most one pin per frame
        }
      }

      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        settling = true;
        settleStart = now;
        settleAngle = currentAngle;
        requestAnimationFrame(animate);
        // Show result after wobble settles
        setTimeout(() => {
          spinning = false;
          spinBtn.disabled = false;
          showResult(winner);
        }, 650);
      }
    } else {
      // Spring-settle wobble: sinusoidal decay; clapper continues settling naturally above
      const elapsed = now - settleStart;
      const settleDuration = 500;
      if (elapsed < settleDuration) {
        const t = elapsed / settleDuration;
        const decay = Math.exp(-t * 5.5);
        const wobble = Math.sin(t * Math.PI * 4) * 0.018 * decay;
        drawWheel(settleAngle + wobble);
        requestAnimationFrame(animate);
      } else {
        currentAngle = settleAngle;
        drawWheel(currentAngle);
      }
    }
  }

  requestAnimationFrame(animate);
}

// ─── Confetti ───
let confettiParticles = [];
let confettiAnim = null;

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}

function launchConfetti() {
  resizeConfetti();
  confettiParticles = [];
  const colors = ['#ff6b6b','#ffc857','#4ecdc4','#a06cd5','#ff9f43','#6ec6ff','#ff78ae','#7bed9f','#ffd93d','#fd79a8'];

  for (let i = 0; i < 150; i++) {
    confettiParticles.push({
      x: window.innerWidth / 2 + (Math.random() - 0.5) * 200,
      y: window.innerHeight / 2 - 100,
      vx: (Math.random() - 0.5) * 16,
      vy: -(Math.random() * 12 + 4),
      w: Math.random() * 10 + 4,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 12,
      gravity: 0.18 + Math.random() * 0.08,
      opacity: 1,
      decay: 0.003 + Math.random() * 0.004,
    });
  }

  if (confettiAnim) cancelAnimationFrame(confettiAnim);
  animateConfetti();
}

function animateConfetti() {
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  let alive = false;

  confettiParticles.forEach(p => {
    if (p.opacity <= 0) return;
    alive = true;
    p.x += p.vx;
    p.vy += p.gravity;
    p.y += p.vy;
    p.vx *= 0.99;
    p.rotation += p.rotSpeed;
    p.opacity -= p.decay;

    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate((p.rotation * Math.PI) / 180);
    confettiCtx.globalAlpha = Math.max(0, p.opacity);
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    confettiCtx.restore();
  });

  if (alive) {
    confettiAnim = requestAnimationFrame(animateConfetti);
  } else {
    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }
}

// ─── Game List UI ───
function renderGameList() {
  const active = getActiveGames();
  noGamesMsg.style.display = active.length === 0 ? '' : 'none';
  document.getElementById('wheel-stage').style.display = active.length === 0 ? 'none' : '';
  spinBtn.style.display = active.length === 0 ? 'none' : '';

  gameListEl.innerHTML = '';
  games.forEach((game, idx) => {
    const li = document.createElement('li');
    li.className = 'game-item' + (game.enabled ? '' : ' disabled');

    const dot = document.createElement('span');
    dot.className = 'color-dot';
    // Find this game's index among active games for color matching
    const activeIdx = active.indexOf(game);
    dot.style.background = game.enabled && activeIdx >= 0
      ? SEGMENT_COLORS[activeIdx % SEGMENT_COLORS.length]
      : 'var(--text-muted)';

    const label = document.createElement('label');
    label.textContent = game.name;
    label.setAttribute('for', `toggle-${idx}`);

    const toggle = document.createElement('div');
    toggle.className = 'toggle';
    const input = document.createElement('input');
    input.type = 'checkbox';
    input.checked = game.enabled;
    input.id = `toggle-${idx}`;
    input.addEventListener('change', () => {
      game.enabled = input.checked;
      saveGames();
      renderGameList();
      resizeCanvas();
      drawWheel(currentAngle);
    });
    const slider = document.createElement('span');
    slider.className = 'slider';
    toggle.appendChild(input);
    toggle.appendChild(slider);

    li.appendChild(dot);
    li.appendChild(label);
    li.appendChild(toggle);

    if (game.custom) {
      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.textContent = '\u00d7';
      del.title = 'Remove game';
      del.addEventListener('click', () => {
        games.splice(idx, 1);
        saveGames();
        renderGameList();
        resizeCanvas();
        drawWheel(currentAngle);
      });
      li.appendChild(del);
    }

    gameListEl.appendChild(li);
  });
  renderPickBadges();
}

document.getElementById('import-toggle-btn').addEventListener('click', () => {
  const panel = document.getElementById('import-panel');
  panel.classList.toggle('visible');
  document.getElementById('import-msg').textContent = '';
});

document.getElementById('import-cancel-btn').addEventListener('click', () => {
  document.getElementById('import-panel').classList.remove('visible');
  document.getElementById('import-textarea').value = '';
  document.getElementById('import-msg').textContent = '';
});

document.getElementById('import-file').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => { document.getElementById('import-textarea').value = ev.target.result; };
  reader.readAsText(file);
  e.target.value = '';
});

function parseAndImportCSV(text) {
  let added = 0;
  text.split('\n').forEach(line => {
    line = line.trim();
    if (!line || line.startsWith('#')) return;
    const commaIdx = line.indexOf(',');
    const name = (commaIdx >= 0 ? line.slice(0, commaIdx) : line).trim();
    const url = (commaIdx >= 0 ? line.slice(commaIdx + 1) : '').trim();
    if (!name) return;
    if (games.some(g => g.name.toLowerCase() === name.toLowerCase())) return;
    games.push({ name, url, enabled: true, custom: true });
    added++;
  });
  return added;
}

document.getElementById('import-do-btn').addEventListener('click', () => {
  const text = document.getElementById('import-textarea').value;
  const added = parseAndImportCSV(text);
  const msg = document.getElementById('import-msg');
  if (added > 0) {
    saveGames();
    renderGameList();
    renderLibraryList();
    resizeCanvas();
    drawWheel(currentAngle);
    msg.textContent = `Added ${added} game${added !== 1 ? 's' : ''}`;
    msg.style.color = 'var(--accent-teal)';
    document.getElementById('import-textarea').value = '';
  } else {
    msg.textContent = 'No new games found';
    msg.style.color = 'var(--text-muted)';
  }
});

// ─── Expansion Packs ───
let activePack = 0;

function renderLibraryList() {
  const tabsEl = document.getElementById('pack-tabs');
  const list = document.getElementById('library-list');

  // Render tabs
  tabsEl.innerHTML = '';
  GAME_LIBRARY.forEach((pack, i) => {
    const btn = document.createElement('button');
    btn.className = 'pack-tab' + (i === activePack ? ' active' : '');
    btn.textContent = pack.pack;
    btn.addEventListener('click', () => { activePack = i; renderLibraryList(); });
    tabsEl.appendChild(btn);
  });

  // Render games for active pack
  list.innerHTML = '';
  const packGames = GAME_LIBRARY[activePack].games;
  packGames.forEach((libGame, i) => {
    const alreadyAdded = games.some(g => g.name.toLowerCase() === libGame.name.toLowerCase());
    const li = document.createElement('li');
    li.className = 'library-item' + (alreadyAdded ? ' already-added' : '');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.id = `lib-cb-${i}`;
    cb.checked = alreadyAdded;
    cb.disabled = alreadyAdded;

    const label = document.createElement('label');
    label.htmlFor = `lib-cb-${i}`;
    label.textContent = libGame.name;

    li.appendChild(cb);
    li.appendChild(label);

    if (libGame.url) {
      const link = document.createElement('a');
      link.href = libGame.url;
      link.target = '_blank';
      link.rel = 'noopener';
      link.className = 'lib-link';
      link.title = libGame.url;
      link.textContent = '\u2197';
      link.addEventListener('click', e => e.stopPropagation());
      li.appendChild(link);
    }

    list.appendChild(li);
  });
}

document.getElementById('library-toggle-btn').addEventListener('click', () => {
  const btn = document.getElementById('library-toggle-btn');
  const body = document.getElementById('library-body');
  btn.classList.toggle('open');
  body.classList.toggle('visible');
  if (body.classList.contains('visible')) renderLibraryList();
});

document.getElementById('library-add-btn').addEventListener('click', () => {
  const checkboxes = document.getElementById('library-list')
    .querySelectorAll('input[type="checkbox"]:checked:not(:disabled)');
  let added = 0;
  checkboxes.forEach(cb => {
    const idx = parseInt(cb.id.replace('lib-cb-', ''));
    const libGame = GAME_LIBRARY[activePack].games[idx];
    if (!games.some(g => g.name.toLowerCase() === libGame.name.toLowerCase())) {
      games.push({ name: libGame.name, url: libGame.url, enabled: true, custom: true });
      added++;

  });

    saveGames();
    renderGameList();
    renderLibraryList();
    resizeCanvas();
    drawWheel(currentAngle);

});

});

// ─── Reset to Defaults ───
document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('Reset to default games? This will remove all custom and library games.')) return;
  games = DEFAULT_GAMES.map(g => ({ ...g }));
  saveGames();
  clearHistory();
  renderGameList();
  renderLibraryList();
  resizeCanvas();
  drawWheel(currentAngle);
});

document.getElementById('stats-toggle-btn').addEventListener('click', () => {
  const btn = document.getElementById('stats-toggle-btn');
  const body = document.getElementById('stats-body');
  btn.classList.toggle('open');
  body.classList.toggle('visible');
  if (body.classList.contains('visible')) renderStatsPanel();
});

document.getElementById('clear-history-btn').addEventListener('click', () => {
  clearHistory();
  renderStatsPanel();
});

document.getElementById('stress-test-btn').addEventListener('click', () => {
  if (stressTestTimer) stopStressTest();
  else startStressTest();
});

document.getElementById('stress-close').addEventListener('click', () => {
  document.getElementById('stress-overlay').classList.remove('visible');
});

// ─── Banner Text ───
(function initBanner() {
  const signEl = document.getElementById('sign-text');
  const input  = document.getElementById('banner-text-input');
  const saved  = localStorage.getItem('bannerText');
  if (saved && signEl) {
    signEl.innerHTML = saved.replace(/\n/g, '<br>');
    input.value = saved;
  }
  document.getElementById('banner-text-save').addEventListener('click', () => {
    const val = input.value.trim();
    if (!val) return;
    signEl.innerHTML = val.replace(/\n/g, '<br>');
    localStorage.setItem('bannerText', val);
  });
})();

// ─── Sidebar Mobile ───
sidebarToggle.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  sidebarBackdrop.classList.toggle('visible');
});
sidebarBackdrop.addEventListener('click', () => {
  sidebar.classList.remove('open');
  sidebarBackdrop.classList.remove('visible');
});

// ─── Spin ───
spinBtn.addEventListener('click', spin);

// ─── Init ───
loadGames();
renderGameList();

function init() {
  resizeCanvas();
  drawWheel(currentAngle);
}

init();
window.addEventListener('resize', () => {
  resizeCanvas();
  drawWheel(currentAngle);
  resizeConfetti();
});
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
